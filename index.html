<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Trắc Nghiệm NLS (Hồi Sức Sau Sinh)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .app-view {
            transition: opacity 0.3s ease;
        }
        button {
            touch-action: manipulation;
        }
        .option-btn, .chapter-btn {
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled), .chapter-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        @media (hover: none) {
            .option-btn:hover:not(:disabled), .chapter-btn:hover:not(:disabled) {
                transform: none;
                box-shadow: none;
            }
        }
        .correct-anim { animation: pulse-green 0.5s; }
        .wrong-anim { animation: shake 0.5s; }
        
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .feedback-enter { animation: slideInDown 0.4s ease forwards; }
        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Circular Chart */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
        .circle-bg { fill: none; stroke: #e5e7eb; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; animation: progress 1s ease-out forwards; }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }
        .percentage { fill: #1f2937; font-family: inherit; font-weight: bold; font-size: 0.5em; text-anchor: middle; }
        .fraction { fill: #6b7280; font-family: inherit; font-size: 0.25em; text-anchor: middle; }
        
        .score-excellent .circle { stroke: #10b981; }
        .score-good .circle { stroke: #3b82f6; }
        .score-poor .circle { stroke: #ef4444; }
        
        /* Custom grid cho Home screen */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
        }
        @media (min-width: 640px) {
            .chapter-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-2 sm:p-4 md:p-8 flex items-start sm:items-center justify-center">

    <div id="app" class="w-full max-w-4xl mx-auto py-4 sm:py-0">
        
        <!-- ==================== HOME VIEW ==================== -->
        <div id="homeView" class="app-view bg-white rounded-xl md:rounded-2xl shadow-lg md:shadow-xl overflow-hidden p-6 sm:p-8 md:p-12">
            <header class="text-center mb-8 sm:mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-100 mb-4">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477-4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-blue-900 mb-3 leading-tight">Hệ Thống Trắc Nghiệm NLS</h1>
                <p class="text-base sm:text-lg text-gray-600">Khóa Hồi Sức Sau Sinh (Newborn Life Support)</p>
            </header>

            <div class="mb-8">
                <button onclick="startRandomFullTest()" class="w-full py-4 sm:py-5 px-6 bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white text-lg sm:text-xl font-bold rounded-xl shadow-lg transform transition-all hover:-translate-y-1 hover:shadow-xl flex items-center justify-center gap-3">
                    <svg class="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    BỘ ĐỀ TỔNG HỢP (50 Câu Ngẫu Nhiên)
                </button>
                <p class="text-center text-sm text-gray-500 mt-3 italic">Trộn ngẫu nhiên từ toàn bộ kho dữ liệu 13 chương.</p>
            </div>

            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink-0 mx-4 text-gray-500 font-medium">Hoặc chọn ôn theo từng chương</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div id="chapterGrid" class="chapter-grid mt-6">
                <!-- Buttons will be generated by JS -->
            </div>
        </div>

        <!-- ==================== QUIZ VIEW ==================== -->
        <div id="quizArea" class="hidden app-view bg-white rounded-xl md:rounded-2xl shadow-lg md:shadow-xl overflow-hidden">
            <!-- Header Top Bar -->
            <div class="bg-gray-50 border-b border-gray-200 px-4 py-3 flex justify-between items-center">
                <button onclick="goHome()" class="text-gray-600 hover:text-blue-600 font-medium flex items-center gap-1 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Trang chủ
                </button>
                <span id="quizTitleBadge" class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide"></span>
            </div>

            <!-- Progress Bar -->
            <div class="w-full bg-gray-200 h-1.5 md:h-2">
                <div id="progressBar" class="bg-blue-600 h-1.5 md:h-2 transition-all duration-500 ease-out" style="width: 0%;"></div>
            </div>

            <div class="p-4 sm:p-6 md:p-10">
                <div class="flex justify-between items-center mb-5 md:mb-6 text-xs sm:text-sm font-semibold text-gray-500 tracking-wider">
                    <span id="questionCounter">Câu 1 / X</span>
                </div>

                <h2 id="questionText" class="text-lg sm:text-xl md:text-2xl font-medium leading-relaxed mb-6 sm:mb-8 text-gray-800">
                    Đang tải câu hỏi...
                </h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 mb-6 sm:mb-8">
                    <button id="btnTrue" onclick="checkAnswer(true)" class="option-btn relative w-full py-3.5 sm:py-4 text-base sm:text-lg font-bold rounded-lg sm:rounded-xl border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-200">
                        1. ĐÚNG
                    </button>
                    <button id="btnFalse" onclick="checkAnswer(false)" class="option-btn relative w-full py-3.5 sm:py-4 text-base sm:text-lg font-bold rounded-lg sm:rounded-xl border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-200">
                        2. SAI
                    </button>
                </div>

                <div id="feedbackArea" class="hidden feedback-enter rounded-lg sm:rounded-xl p-4 sm:p-5 mb-5 md:mb-6 border-l-4">
                    <div class="flex items-start">
                        <div id="feedbackIcon" class="flex-shrink-0 mt-0.5"></div>
                        <div class="ml-3 w-full">
                            <h3 id="feedbackTitle" class="text-base sm:text-lg font-bold mb-1"></h3>
                            <p id="feedbackRationale" class="text-sm sm:text-base text-gray-700 mb-3 leading-relaxed"></p>
                            
                            <div class="bg-white bg-opacity-50 rounded-lg p-2.5 sm:p-3 text-xs sm:text-sm italic text-gray-600 border border-gray-200">
                                <strong>💡 Gợi ý tư duy:</strong> <span id="feedbackHint"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row justify-end mt-2 md:mt-4 gap-3">
                    <button id="btnNext" onclick="nextQuestion()" class="hidden w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 md:px-8 rounded-lg sm:rounded-xl shadow-md transition-colors focus:outline-none focus:ring-2 focus:ring-blue-300">
                        Câu tiếp theo ➔
                    </button>
                    <button id="btnFinish" onclick="showResults()" class="hidden w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 md:px-8 rounded-lg sm:rounded-xl shadow-md transition-colors focus:outline-none focus:ring-2 focus:ring-green-300">
                        Xem Kết Quả
                    </button>
                </div>
            </div>
        </div>

        <!-- ==================== RESULT VIEW ==================== -->
        <div id="resultArea" class="hidden app-view bg-white rounded-xl md:rounded-2xl shadow-lg md:shadow-xl overflow-hidden p-6 sm:p-8 md:p-12 text-center mx-2 sm:mx-0">
            <h2 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">Báo cáo Kết quả</h2>
            <p id="resultSubtitle" class="text-sm sm:text-base text-gray-600 mb-6">Đánh giá phản xạ lâm sàng</p>
            
            <div id="chartContainer" class="mb-6">
                <svg viewBox="0 0 36 36" class="circular-chart score-good">
                    <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                    <path class="circle" id="resultCircle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                    <text x="18" y="17" class="percentage" id="chartPercentage">0%</text>
                    <text x="18" y="24" class="fraction" id="chartFraction">0 / X</text>
                </svg>
            </div>

            <p id="resultMessage" class="text-base sm:text-lg font-medium text-gray-700 mb-8 px-2 sm:px-4 leading-relaxed"></p>

            <div class="flex flex-col sm:flex-row justify-center gap-4 w-full px-2 sm:px-0">
                <button onclick="goHome()" class="w-full sm:w-auto bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3.5 sm:py-4 px-6 rounded-lg sm:rounded-xl transition-colors focus:outline-none">
                    ⌂ Về Trang Chủ
                </button>
                <button id="btnRetrySame" onclick="restartQuiz(false)" class="w-full sm:w-auto bg-gray-800 hover:bg-gray-900 text-white font-bold py-3.5 sm:py-4 px-6 rounded-lg sm:rounded-xl shadow-md transition-colors focus:outline-none">
                    ↺ Làm lại (Giữ thứ tự)
                </button>
                <button onclick="restartQuiz(true)" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 sm:py-4 px-6 rounded-lg sm:rounded-xl shadow-md transition-colors focus:outline-none flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    Trộn câu & Làm lại
                </button>
            </div>
        </div>
    </div>

    <script>
        // ================= DATABASE =================
        const allChaptersData = {
            1: {
                title: "Chương 1: Giới thiệu khóa NLS",
                isAvailable: true,
                questions: [
                    {
                        question: "Phát biểu: Trong tiếp cận chuẩn của NLS, ấn tim và dùng thuốc được xem là những can thiệp trọng tâm và cần thực hiện song song với việc làm nở phổi ngay từ giây đầu tiên.",
                        isTrue: false,
                        rationale: "Khóa học nhấn mạnh tầm quan trọng của việc kiểm soát nhiệt độ, ưu tiên kiểm soát đường thở và làm nở phổi, trong khi ấn tim và thuốc chỉ có vai trò hạn chế [1].",
                        hint: "Hãy nhớ về bản chất của hồi sức sơ sinh là giải quyết vấn đề hô hấp hay tim mạch trước?"
                    },
                    {
                        question: "Phát biểu: Các kỹ năng và kiến thức trong khóa học NLS được thiết kế để áp dụng tối ưu cho việc hồi sức trẻ trong khung thời gian 10–20 phút đầu sau sinh.",
                        isTrue: true,
                        rationale: "Mục tiêu của khóa học là giúp nhân viên y tế thực hành kỹ năng và áp dụng vào hồi sức trẻ hiệu quả trong 10–20 phút đầu sau sinh [2].",
                        hint: "Đây là giai đoạn chuyển tiếp quan trọng nhất từ tuần hoàn bào thai sang hô hấp tự nhiên."
                    },
                    {
                        question: "Phát biểu: Việc đọc và nắm vững toàn bộ giáo trình NLS là điều kiện đủ để một bác sĩ đạt được năng lực thực hành lâm sàng trong hỗ trợ trẻ mới sinh thích nghi cuộc sống.",
                        isTrue: false,
                        rationale: "Giáo trình chỉ cung cấp kiến thức; để đạt được kỹ năng thực tế, người học bắt buộc phải tham gia khóa học thực hành trực tiếp và luyện tập trên mô hình [3].",
                        hint: "Hồi sức là một kỹ năng cần sự phối hợp giữa 'não bộ' và 'bàn tay'."
                    },
                    {
                        question: "Phát biểu: Khóa học NLS yêu cầu người học phải thực hành thành thạo ba kỹ năng kỹ thuật chính: kiểm soát đường thở (thông khí), ấn tim và đặt tĩnh mạch rốn.",
                        isTrue: true,
                        rationale: "Học viên cần được dạy và thực hành trên mô hình các kỹ năng: kiểm soát đường thở/thông khí, ấn tim và đặt tĩnh mạch rốn [4].",
                        hint: "Đây là ba bước tương ứng với B-C-D trong lưu đồ hồi sức nâng cao."
                    },
                    {
                        question: "Phát biểu: Trong các tình huống cấp cứu trẻ mới sinh, kỹ năng giao tiếp và làm việc nhóm được đánh giá có tầm quan trọng tương đương với các kỹ năng kỹ thuật cá nhân.",
                        isTrue: true,
                        rationale: "Khóa học đề cao tầm quan trọng của giao tiếp, yếu tố con người và làm việc nhóm trong xử trí tức thời các trường hợp cấp cứu [4].",
                        hint: "80% sai sót y khoa trong hồi sức thường bắt nguồn từ đâu?"
                    },
                    {
                        question: "Phát biểu: Theo hướng dẫn của Hội đồng Hồi sức Châu Âu (ERC), trong bối cảnh đại dịch, việc cứu sống trẻ sơ sinh luôn là ưu tiên tuyệt đối, đứng trên cả việc đảm bảo an toàn cho nhân viên y tế.",
                        isTrue: false,
                        rationale: "Việc đảm bảo an toàn cho người thực hiện cấp cứu luôn là ưu tiên hàng đầu trong các hướng dẫn của ERC [5].",
                        hint: "Nguyên tắc an toàn cơ bản nhất của mọi quy trình cấp cứu là gì?"
                    },
                    {
                        question: "Phát biểu: Khi thực hiện các thủ thuật tạo hạt khí dung (AGPs) như thông khí áp lực dương, nhân viên y tế bắt buộc phải sử dụng PPE cấp độ cao (như khẩu trang FFP3 hoặc N95).",
                        isTrue: true,
                        rationale: "Đối với các thủ thuật tạo hạt khí dung, người cấp cứu cần sử dụng PPE chuẩn (FFP3/N95) để bảo vệ khỏi lây nhiễm mầm bệnh [6].",
                        hint: "AGPs làm tăng nguy cơ lây truyền mầm bệnh qua đường không khí."
                    },
                    {
                        question: "Phát biểu: Hệ thống 'CoSy' của Hội đồng Hồi sức Châu Âu là nguồn cung cấp các tư liệu nghe nhìn quan trọng cần được đọc kết hợp với giáo trình để đạt kết quả học tập tốt nhất.",
                        isTrue: true,
                        rationale: "Người học nên đọc giáo trình kết hợp với các tư liệu học tập nghe nhìn có sẵn trên trang web 'CoSy' của ERC [7].",
                        hint: "Đây là nền tảng quản lý đào tạo trực tuyến của ERC."
                    }
                ]
            },
            2: {
                title: "Chương 2: Khác biệt trẻ mới sinh",
                isAvailable: true,
                questions: [
                    {
                        question: "Phát biểu: Khác với người lớn thường do biến cố tim mạch nguyên phát, tình trạng cần hồi sức ở trẻ em và trẻ sơ sinh hầu hết bắt nguồn từ bệnh lý hô hấp dẫn đến tổn thương chức năng cơ tim thứ phát [1, 2].",
                        isTrue: true,
                        rationale: "Ở trẻ em và trẻ sơ sinh, vấn đề chính là hỗ trợ hô hấp; khi phổi được thông khí, máu giàu oxy về tim sẽ giúp hệ tuần hoàn phục hồi [2, 3].",
                        hint: "Hãy cân nhắc xem tim hay phổi thường là \"kẻ khởi đầu\" cho sự suy sụp ở trẻ mới sinh."
                    },
                    {
                        question: "Phát biểu: Một trẻ đủ tháng sinh qua ngả âm đạo vẫn còn khoảng 100 mL dịch phổi cần được tái hấp thu hoặc tống xuất sau khi chào đời [4].",
                        isTrue: true,
                        rationale: "Mặc dù dịch phổi bắt đầu tái hấp thu khi chuyển dạ, trẻ sinh thường vẫn còn 100 mL dịch, và trẻ sinh mổ chủ động có thể còn nhiều hơn thế [4].",
                        hint: "Chuyển dạ giúp ép dịch, nhưng vẫn còn một lượng đáng kể trong phế nang."
                    },
                    {
                        question: "Phát biểu: Do các rối loạn nhịp tim nặng thường xảy ra trong quá trình ngạt sơ sinh, máy khử rung tim là thiết bị bắt buộc phải có sẵn trên bàn hồi sức [3].",
                        isTrue: false,
                        rationale: "Các rối loạn nhịp tim nặng hay gặp ở người lớn thường không xảy ra ở trẻ sơ sinh, do đó thiết bị khử rung tim là không cần thiết [3].",
                        hint: "Rối loạn nhịp tim nguyên phát có phổ biến ở trẻ sơ sinh không?"
                    },
                    {
                        question: "Phát biểu: Theo dữ liệu y văn, khoảng 10% trẻ sơ sinh đủ tháng sẽ bắt đầu nhịp thở đầu tiên chỉ sau các thao tác lau khô và kích thích xúc giác đơn thuần [5].",
                        isTrue: true,
                        rationale: "85% trẻ tự thở trong 10–30 giây, 10% đáp ứng sau khi được kích thích, và chỉ khoảng 3% cần thông khí áp lực dương (PPV) [5].",
                        hint: "Đa số trẻ tự thở trong 10–30 giây, một nhóm nhỏ cần \"nhắc nhở\"."
                    },
                    {

            11: {

                        question: "Phát biểu: Một nhà lãnh đạo giỏi chỉ cần đưa ra các mệnh lệnh quyết đoán mà không cần mất thời gian lắng nghe thông tin phản hồi từ các thành viên khác. [17]",
                        isTrue: false,
                        rationale: "Đặc điểm của nhà lãnh đạo giỏi là phải biết lắng nghe, chọn lọc thông tin và điều khiển vòng giao tiếp hiệu quả. [17]",
                        hint: "Lắng nghe giúp trưởng nhóm có thêm dữ liệu để ra quyết định đúng."
                    },
                    {
                        question: "Phát biểu: Việc áp dụng thường xuyên các kỹ năng đã học vào thực tế lâm sàng là trách nhiệm của cá nhân người học sau khi hoàn thành khóa NLS. [14]",
                        isTrue: true,
                        rationale: "Học viên sẽ mất hết kỹ năng nếu không áp dụng thường xuyên, bất kể họ đã từng đạt kết quả tốt thế nào trong khóa học. [15]",
                        hint: "Chứng chỉ chỉ là điểm bắt đầu của hành trình năng lực."
                    }
                ]
            }
        };

        // ================= APP STATE =================
        let currentMode = "HOME"; // "HOME", "QUIZ", "RESULT"
        let currentQuizType = null; // "CHAPTER_X" or "RANDOM_ALL"
        let questions = []; 
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;

        // UI Elements
        const ui = {
            homeView: document.getElementById('homeView'),
            quizArea: document.getElementById('quizArea'),
            resultArea: document.getElementById('resultArea'),
            chapterGrid: document.getElementById('chapterGrid'),
            
            quizTitleBadge: document.getElementById('quizTitleBadge'),
            progressBar: document.getElementById('progressBar'),
            questionCounter: document.getElementById('questionCounter'),
            questionText: document.getElementById('questionText'),
            
            btnTrue: document.getElementById('btnTrue'),
            btnFalse: document.getElementById('btnFalse'),
            
            feedbackArea: document.getElementById('feedbackArea'),
            feedbackIcon: document.getElementById('feedbackIcon'),
            feedbackTitle: document.getElementById('feedbackTitle'),
            feedbackRationale: document.getElementById('feedbackRationale'),
            feedbackHint: document.getElementById('feedbackHint'),
            
            btnNext: document.getElementById('btnNext'),
            btnFinish: document.getElementById('btnFinish'),
            btnRetrySame: document.getElementById('btnRetrySame'),
            
            resultSubtitle: document.getElementById('resultSubtitle'),
            resultMessage: document.getElementById('resultMessage'),
            chartContainer: document.getElementById('chartContainer'),
            resultCircle: document.getElementById('resultCircle'),
            chartPercentage: document.getElementById('chartPercentage'),
            chartFraction: document.getElementById('chartFraction')
        };

        const icons = {
            success: `<svg class="h-5 w-5 sm:h-6 sm:w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`,
            error: `<svg class="h-5 w-5 sm:h-6 sm:w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`,
            lock: `<svg class="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>`
        };

        // ================= INITIALIZATION =================
        function initApp() {
            renderChapterButtons();
            switchView("HOME");
        }

        function renderChapterButtons() {
            let html = '';
            for (let i = 1; i <= 13; i++) {
                const chapter = allChaptersData[i];
                if (chapter.isAvailable) {
                    html += `
                        <button onclick="startChapterTest(${i})" class="chapter-btn p-4 rounded-xl border border-gray-200 bg-white hover:border-blue-400 hover:bg-blue-50 text-left flex flex-col justify-between h-full group">
                            <span class="text-xs font-bold text-blue-600 mb-1 uppercase tracking-wider">Chương ${i}</span>
                            <span class="text-sm font-medium text-gray-800 group-hover:text-blue-800 leading-tight">${chapter.title.replace(`Chương ${i}: `, '')}</span>
                            <span class="text-xs text-gray-400 mt-3 pt-2 border-t border-gray-100 flex items-center justify-between w-full">
                                <span>${chapter.questions.length} câu</span>
                                <svg class="w-4 h-4 text-gray-300 group-hover:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </span>
                        </button>
                    `;
                } else {
                    html += `
                        <button disabled class="p-4 rounded-xl border border-gray-100 bg-gray-50 opacity-60 text-left flex flex-col justify-between h-full cursor-not-allowed">
                            <span class="text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">Chương ${i}</span>
                            <span class="text-sm font-medium text-gray-500 leading-tight">${chapter.title.replace(`Chương ${i}: `, '')}</span>
                            <span class="text-xs text-gray-400 mt-3 pt-2 border-t border-gray-100 flex items-center">
                                ${icons.lock} Đang cập nhật
                            </span>
                        </button>
                    `;
                }
            }
            ui.chapterGrid.innerHTML = html;
        }

        function switchView(viewName) {
            currentMode = viewName;
            ui.homeView.classList.add('hidden');
            ui.quizArea.classList.add('hidden');
            ui.resultArea.classList.add('hidden');
            
            if (viewName === "HOME") {
                ui.homeView.classList.remove('hidden');
            } else if (viewName === "QUIZ") {
                ui.quizArea.classList.remove('hidden');
            } else if (viewName === "RESULT") {
                ui.resultArea.classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goHome() {
            switchView("HOME");
        }

        // ================= QUIZ LOGIC =================
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function getAllAvailableQuestions() {
            let allQ = [];
            for (let i = 1; i <= 13; i++) {
                if (allChaptersData[i].isAvailable) {
                    allQ = allQ.concat(allChaptersData[i].questions);
                }
            }
            return allQ;
        }

        function startChapterTest(chapterId) {
            currentQuizType = `CHAPTER_${chapterId}`;
            ui.quizTitleBadge.textContent = `CHƯƠNG ${chapterId}`;
            ui.resultSubtitle.textContent = `Báo cáo Chương ${chapterId}`;
            
            questions = [...allChaptersData[chapterId].questions];
            ui.btnRetrySame.classList.remove('hidden');
            
            initQuizSession();
        }

        function startRandomFullTest() {
            currentQuizType = "RANDOM_ALL";
            ui.quizTitleBadge.textContent = "BỘ ĐỀ TỔNG HỢP";
            ui.resultSubtitle.textContent = "Báo cáo Bộ Đề Tổng Hợp (Random)";
            
            let allQ = getAllAvailableQuestions();
            allQ = shuffleArray(allQ);
            const numQuestions = Math.min(50, allQ.length);
            questions = allQ.slice(0, numQuestions);
            
            ui.btnRetrySame.classList.add('hidden');
            initQuizSession();
        }

        function restartQuiz(shuffle) {
            if (currentQuizType === "RANDOM_ALL") {
                startRandomFullTest(); 
            } else {
                const chapterId = parseInt(currentQuizType.split('_')[1]);
                if (shuffle) {
                    questions = shuffleArray([...allChaptersData[chapterId].questions]);
                    ui.btnRetrySame.classList.add('hidden');
                } else {
                    questions = [...allChaptersData[chapterId].questions];
                    ui.btnRetrySame.classList.remove('hidden');
                }
                initQuizSession();
            }
        }

        function initQuizSession() {
            currentQuestionIndex = 0;
            score = 0;
            switchView("QUIZ");
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            const q = questions[currentQuestionIndex];
            
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            ui.progressBar.style.width = `${progress}%`;
            ui.questionCounter.textContent = `Câu ${currentQuestionIndex + 1} / ${questions.length}`;
            
            ui.questionText.innerHTML = q.question.replace('Phát biểu: ', '<span class="text-blue-600 font-bold">Phát biểu:</span><br>');
            
            ui.btnTrue.className = 'option-btn relative w-full py-3.5 sm:py-4 text-base sm:text-lg font-bold rounded-lg sm:rounded-xl border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-200 transition-colors';
            ui.btnFalse.className = 'option-btn relative w-full py-3.5 sm:py-4 text-base sm:text-lg font-bold rounded-lg sm:rounded-xl border-2 border-gray-200 bg-white text-gray-700 hover:border-blue-500 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-200 transition-colors';
            ui.btnTrue.disabled = false;
            ui.btnFalse.disabled = false;
            
            ui.feedbackArea.classList.add('hidden');
            ui.btnNext.classList.add('hidden');
            ui.btnFinish.classList.add('hidden');
        }

        function checkAnswer(userChoice) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentQuestionIndex];
            const isCorrect = (userChoice === q.isTrue);
            if (isCorrect) score++;

            ui.btnTrue.disabled = true;
            ui.btnFalse.disabled = true;

            const selectedBtn = userChoice ? ui.btnTrue : ui.btnFalse;
            const correctBtn = q.isTrue ? ui.btnTrue : ui.btnFalse;
            const wrongBtn = !q.isTrue ? ui.btnTrue : ui.btnFalse;

            correctBtn.className = 'w-full py-3.5 sm:py-4 text-base sm:text-lg font-bold rounded-lg sm:rounded-xl border-2 transition-colors border-green-500 bg-green-50 text-green-700';
            wrongBtn.className = 'w-full py-3.5 sm:py-4 text-base sm:text-lg font-bold rounded-lg sm:rounded-xl border-2 transition-colors border-gray-200 bg-gray-50 text-gray-400 opacity-60';

            if (isCorrect) {
                selectedBtn.classList.add('correct-anim');
            } else {
                selectedBtn.className = 'w-full py-3.5 sm:py-4 text-base sm:text-lg font-bold rounded-lg sm:rounded-xl border-2 transition-colors border-red-500 bg-red-50 text-red-700 wrong-anim';
            }

            showFeedback(isCorrect, q);
        }

        function showFeedback(isCorrect, q) {
            ui.feedbackArea.classList.remove('hidden', 'border-green-500', 'bg-green-50', 'border-red-500', 'bg-red-50');
            
            if (isCorrect) {
                ui.feedbackArea.classList.add('border-green-500', 'bg-green-50');
                ui.feedbackIcon.innerHTML = icons.success;
                ui.feedbackTitle.textContent = "Chính xác!";
                ui.feedbackTitle.className = "text-base sm:text-lg font-bold mb-1 text-green-800";
            } else {
                ui.feedbackArea.classList.add('border-red-500', 'bg-red-50');
                ui.feedbackIcon.innerHTML = icons.error;
                ui.feedbackTitle.textContent = "Chưa chính xác!";
                ui.feedbackTitle.className = "text-base sm:text-lg font-bold mb-1 text-red-800";
            }

            ui.feedbackRationale.textContent = q.rationale;
            ui.feedbackHint.textContent = q.hint;

            if (currentQuestionIndex < questions.length - 1) {
                ui.btnNext.classList.remove('hidden');
            } else {
                ui.btnFinish.classList.remove('hidden');
                ui.progressBar.style.width = '100%';
            }
            
            setTimeout(() => {
                const nextBtn = currentQuestionIndex < questions.length - 1 ? ui.btnNext : ui.btnFinish;
                nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        function showResults() {
            switchView("RESULT");
            
            const total = questions.length;
            const percentage = Math.round((score / total) * 100);
            
            ui.chartPercentage.textContent = `${percentage}%`;
            ui.chartFraction.textContent = `${score} / ${total}`;
            
            ui.resultCircle.style.strokeDasharray = `${percentage}, 100`;
            
            ui.chartContainer.querySelector('svg').className.baseVal = "circular-chart";
            let message = "";
            
            if (percentage === 100) {
                ui.chartContainer.querySelector('svg').classList.add('score-excellent');
                message = "Xuất sắc! Bạn đã nắm vững hoàn toàn các nguyên lý. Bạn đã sẵn sàng xử lý các tình huống cấp cứu!";
                ui.resultMessage.className = "text-base sm:text-lg font-medium text-green-700 mb-8 px-2 sm:px-4 leading-relaxed";
            } else if (percentage >= 70) {
                ui.chartContainer.querySelector('svg').classList.add('score-good');
                message = "Khá tốt! Bạn đã có phản xạ lâm sàng cơ bản. Hãy xem lại kỹ phần giải thích của những câu sai để củng cố kiến thức.";
                ui.resultMessage.className = "text-base sm:text-lg font-medium text-blue-700 mb-8 px-2 sm:px-4 leading-relaxed";
            } else {
                ui.chartContainer.querySelector('svg').classList.add('score-poor');
                message = "Bạn cần ôn tập lại. Hồi sức sơ sinh đòi hỏi độ chính xác tuyệt đối trong các nguyên lý nền tảng.";
                ui.resultMessage.className = "text-base sm:text-lg font-medium text-red-600 mb-8 px-2 sm:px-4 leading-relaxed";
            }
            ui.resultMessage.textContent = message;
        }

        // Khởi động
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
